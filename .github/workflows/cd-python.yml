name: CD | Python Build and Publish

on:
  # Publish using git tags
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write # Needed to upload release assets

jobs:
  build-and-release:
    name: Build and publish to GitHub Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for setuptools-scm
          persist-credentials: false

      - name: Build package
        uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0

      - name: Download built artifacts
        uses: actions/download-artifact@v5
        with:
          name: Packages
          path: dist

      - name: Verify artifact version matches tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import glob
          import os
          import re
          import sys

          expected = os.environ["TAG_NAME"].removeprefix("v")
          wheel_versions = set()
          sdist_versions = set()

          for wheel in glob.glob("dist/*.whl"):
              match = re.search(r"gis_utils_public-([0-9][^-]*)-", wheel)
              if match:
                  wheel_versions.add(match.group(1))

          for sdist in glob.glob("dist/*.tar.gz"):
              match = re.search(r"gis_utils_public-([0-9][^/]*)\.tar\.gz$", sdist)
              if match:
                  sdist_versions.add(match.group(1))

          found_versions = wheel_versions | sdist_versions
          if not found_versions:
              print("No package versions could be parsed from dist artifacts.")
              sys.exit(1)

          if found_versions != {expected}:
              print(f"Version mismatch. Tag expects {expected}, artifacts contain: {sorted(found_versions)}")
              sys.exit(1)

          print(f"Artifact version check passed: {expected}")
          PY

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Installation

            Install directly from this release:
            ```bash
            pip install https://github.com/miljodirektoratet/gis-utils-public/releases/download/${{ github.ref_name }}/gis_utils_public-*.whl
            ```

            Or from the repository:
            ```bash
            pip install git+https://github.com/miljodirektoratet/gis-utils-public.git@${{ github.ref_name }}
            ```
          fail_on_unmatched_files: true
