name: CI | Python Package Install and Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package-install-smoke:
    name: Package Install Smoke Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install .

      # SMOKE TEST: Open-GIS functionality only
      # This test validates package installation and metadata on a standard Python environment.
      # ArcGIS-dependent functionality is NOT tested in CI because it requires an ArcGIS Pro/ArcPy runtime.
      # ArcGIS functionality testing is done locally in development environments with ArcGIS Pro available only.
      - name: Smoke test package metadata (open-gis only)
        run: |
          python -c "from importlib.metadata import version; print(f'Package version: {version(\"gis-utils-public\")}')"

  build-and-inspect:
    name: Build and Inspect Package
    needs: [package-install-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build and inspect package artifacts
        uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
